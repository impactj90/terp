services:
  api:
    image: terp-api:latest
    container_name: terp-prod-api
    restart: unless-stopped
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h
      LOG_LEVEL: info
      BASE_URL: ${API_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: terp-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-:80}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
