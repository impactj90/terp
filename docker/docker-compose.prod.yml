services:
  postgres:
    image: postgres:16-alpine
    container_name: terp-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: terp_prod
      POSTGRES_USER: terp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terp -d terp_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    image: terp-api:latest
    container_name: terp-prod-api
    restart: unless-stopped
    environment:
      ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://terp:${DB_PASSWORD}@postgres:5432/terp_prod?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 24h
      LOG_LEVEL: info
      BASE_URL: ${API_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: terp-prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-:80}
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
