services:
  api:
    build:
      context: ..
      dockerfile: docker/api.dev.Dockerfile
    container_name: terp-api
    ports:
      - "8080:8080"
    environment:
      ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRY: 24h
      LOG_LEVEL: debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../apps/api:/app
    working_dir: /app

  web:
    image: node:22-alpine
    container_name: terp-web
    ports:
      - "3001:3001"
    working_dir: /app
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

volumes:
  web_node_modules:
