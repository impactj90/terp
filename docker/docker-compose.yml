services:
  lb:
    image: nginx:alpine
    container_name: terp-lb
    ports:
      - "3080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  web:
    build:
      context: ..
      dockerfile: docker/web.dev.Dockerfile
    container_name: terp-web
    env_file:
      - ../.env
      - ../.env.local
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_ENV: development  # development | production
      # Database (Supabase local Postgres via host network)
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      # JWT
      JWT_SECRET: dev-secret-change-in-production
      # Supabase (local dev keys from `npx supabase status`)
      # NEXT_PUBLIC_ = browser-facing (localhost), SUPABASE_URL = server-side (container→host)
      SUPABASE_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next

  greenmail:
    image: greenmail/standalone:latest
    container_name: terp-greenmail
    ports:
      - "3025:3025"   # SMTP
      - "3143:3143"   # IMAP
      - "3993:3993"   # IMAPS
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.users=test:test@test.local
        -Dgreenmail.hostname=0.0.0.0
