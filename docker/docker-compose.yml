services:
  web:
    image: node:22-alpine
    container_name: terp-web
    ports:
      - "3001:3001"
    working_dir: /app
    volumes:
      - ../:/app
      - web_node_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  web_node_modules:
